name: Terraform CI/CD + DevSecOps

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - phase6-devsecops

permissions:
  contents: read

concurrency:
  group: terraform-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.14.3
  TF_WORKING_DIR: environments/dev

jobs:
  terraform-quality:
    name: Terraform Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  checkov:
    name: Checkov Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/dev
          framework: terraform
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  tfsec:
    name: tfsec Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: environments/dev
          format: sarif
          additional_args: --out tfsec.sarif --soft-fail=false

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec.sarif

  terraform-plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    needs: [terraform-quality, checkov, tfsec]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -reconfigure
      - run: terraform plan -var-file="terraform.tfvars"

  terraform-apply:
    name: Terraform Apply
    if: github.ref == 'refs/heads/main'
    needs: [terraform-quality, checkov, tfsec]
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: terraform init -reconfigure
      - run: terraform apply -auto-approve -var-file="terraform.tfvars"